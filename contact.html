  </div>

<script>
const form = document.getElementById('contactForm');
const feedback = document.getElementById('contactFeedback');

form.addEventListener('submit', (e) => {
  e.preventDefault();

  const data = {
    name: contactName.value,
    email: contactEmail.value,
    phone: contactPhone.value,
    subject: contactSubject.value,
    message: contactMessage.value
  };

  if (!data.name || !data.email || !data.message || !data.email.includes('@')) {
    feedback.innerHTML = '<div class="alert alert-danger">⚠️ Fill all required fields correctly.</div>';
    return;
  }

  feedback.innerHTML = '<div class="alert alert-info">⏳ Sending...</div>';

  fetch("/Bangtilenydoor/backend/api/contact.php", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(result => {
    if (result.status === "success") {
      feedback.innerHTML = '<div class="alert alert-success">✅ Message sent successfully!</div>';
      form.reset();
    } else {
      feedback.innerHTML = '<div class="alert alert-danger">❌ ' + result.message + '</div>';
    }
  })
  .catch(() => {
    feedback.innerHTML = '<div class="alert alert-danger">❌ Server error</div>';
  });
});
</script>
